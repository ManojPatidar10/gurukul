name: gurukul
description: "Gurukul — School Operating System. Single app, role-based home for Teachers and Parents."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend: free-tier Supabase (Postgres + Auth + Storage + Realtime)
  supabase_flutter: ^2.5.6

  # Push notifications: Firebase Cloud Messaging (free at any volume)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4

  # State management — kept deliberately simple for MVP
  provider: ^6.1.2

  # Date formatting (en_IN locale, ₹ amounts)
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
